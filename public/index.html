<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Workspace • Trading Agent</title>

    <link rel="stylesheet" href="/styles-v4.css" />
    <script src="/ui.js" defer></script>
  </head>

  <body>
    <div class="bg-wash"></div>

    <header class="topbar">
      <div class="topbar-left">
        <div class="brand">
          <img src="/logo.PNG" class="brand-logo" alt="Logo" />
          <div class="brand-text">Trading Agent</div>
        </div>
    
        <nav class="tabs">
          <a class="tab active" href="/">Workspace</a>
          <a class="tab" href="/outcomes">Outcomes</a>
          <a class="tab" href="/watch">Watch</a>
          <a class="tab" href="/rules">Rules</a>
          <a class="tab" href="/backtest">Backtest</a>
          <a class="tab" href="/brokers">Brokers</a>
        </nav>
      </div>
    
      <div class="topbar-right">
        <div class="status">
          <span id="socketDot" class="status-dot"></span>
          <span id="socketText">Realtime</span>
        </div>
      </div>
    </header>

    <main class="shell">
      <section class="stack">

        <!-- ROW 1: Activity feed (full width) -->
        <div class="card">
          <div class="card-head">
            <div>
              <div class="card-title">Activity feed</div>
            </div>
            <div class="card-actions">
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th style="width:88px;">Time</th>
                  <th style="width:90px;">Symbol</th>
                  <th style="width:90px;">Market</th>
                  <th style="width:70px;">RS</th>
                  <th style="width:70px;">Dir</th>
                  <th>Message</th>
                </tr>
              </thead>
              <tbody id="feedBody"></tbody>
            </table>
          </div>
        </div>

        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap:16px; margin-top:16px;">
          <div class="card">
            <div class="card-head">
              <div>
                <div class="card-title">Confirmed A+</div>
              </div>
            </div>

            <div id="aPlusEmpty" class="small" style="padding: 12px;">No confirmed A+ entries yet.</div>
            <div class="list" id="aPlusList"></div>
          </div>

          <div class="card">
            <div class="card-head">
              <div>
                <div class="card-title">Forming Candidates</div>
 </div>
            </div>

            <div id="formingEmpty" class="small" style="padding: 12px;">No forming candidates right now.</div>
            <div class="list" id="formingList"></div>
          </div>
        </div>

      </section>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js?v=12"></script>
  </body>
</html>
