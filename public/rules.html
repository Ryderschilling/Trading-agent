<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Strategy • Trading Agent</title>

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.PNG" />
    <link rel="stylesheet" href="/styles-v4.css" />
    <script src="/ui.js" defer></script>

    <style>
      .strategy-page { max-width: 820px; margin: 0 auto; padding: 24px 20px 48px; }

      .strategy-status-bar {
        display: flex; align-items: center; gap: 10px; margin-bottom: 6px;
      }
      .strategy-badge {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
        letter-spacing: .04em; text-transform: uppercase;
      }
      .strategy-badge.active { background: rgba(52,199,89,.15); color: #34c759; }
      .strategy-badge.inactive { background: rgba(255,149,0,.12); color: #ff9500; }
      .strategy-badge .dot {
        width: 6px; height: 6px; border-radius: 50%;
      }
      .strategy-badge.active .dot { background: #34c759; }
      .strategy-badge.inactive .dot { background: #ff9500; }

      .strategy-name { font-size: 22px; font-weight: 700; margin: 0; line-height: 1.2; }
      .strategy-version { font-size: 12px; color: var(--muted, #888); margin-top: 4px; }
      .strategy-description {
        font-size: 13.5px; line-height: 1.6; color: var(--muted, #999);
        margin-top: 10px; max-width: 640px;
      }

      .param-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
        margin-top: 4px;
      }
      .param-item {
        background: var(--surface2, rgba(255,255,255,.04));
        border: 1px solid var(--border, rgba(255,255,255,.08));
        border-radius: 8px;
        padding: 12px 14px;
      }
      .param-label {
        font-size: 10.5px; font-weight: 600; letter-spacing: .06em;
        text-transform: uppercase; color: var(--muted, #888);
        margin-bottom: 5px;
      }
      .param-value {
        font-size: 14px; font-weight: 600; color: var(--text, #fff);
      }
      .param-value.yes { color: #34c759; }
      .param-value.no  { color: var(--muted, #888); }

      .check-list { display: flex; flex-direction: column; gap: 7px; margin-top: 4px; }
      .check-item {
        display: flex; align-items: center; gap: 9px;
        font-size: 13px; color: var(--muted, #aaa);
      }
      .check-item .icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
      .check-item.on { color: var(--text, #e8e8e8); }
      .check-item.off { opacity: .45; }

      .watchlist-chips {
        display: flex; flex-wrap: wrap; gap: 7px; margin-top: 4px;
      }
      .sym-chip {
        padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
        background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
        color: var(--text, #e8e8e8);
      }

      .no-strategy {
        text-align: center; padding: 60px 20px;
        color: var(--muted, #888); font-size: 14px;
      }

      .card + .card { margin-top: 16px; }

      .loading-spinner {
        display: flex; align-items: center; justify-content: center;
        padding: 60px; color: var(--muted, #888); font-size: 14px;
      }

      /* ── Version history ──────────────────────────────────────────────── */
      .version-list { padding: 4px 0; }
      .version-row {
        display: flex; align-items: center; justify-content: space-between;
        padding: 10px 20px; gap: 12px;
        border-bottom: 1px solid var(--line, #e1e1e1);
      }
      .version-row:last-child { border-bottom: none; }
      .version-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
      .version-num { font-size: 12px; font-weight: 700; color: var(--muted, #888); flex-shrink: 0; }
      .version-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .version-badge {
        display: inline-flex; align-items: center; padding: 2px 8px;
        border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: .04em;
        text-transform: uppercase; background: rgba(0,0,0,0.06); color: var(--text, #000);
        flex-shrink: 0;
      }
      .version-actions { display: flex; gap: 6px; flex-shrink: 0; }
      .btn-xs {
        padding: 5px 10px; font-size: 11px; font-weight: 700;
        border-radius: 8px; border: 1px solid var(--line, #e1e1e1);
        background: transparent; color: var(--text, #000); cursor: pointer;
        transition: background .12s;
      }
      .btn-xs:hover { background: rgba(0,0,0,0.05); }
      .btn-xs.btn-muted { color: var(--muted, #888); }

      /* ── Editor ───────────────────────────────────────────────────────── */
      .ed-card { margin-bottom: 40px; }

      .ed-body { padding: 0 20px 28px; }

      .ed-section {
        padding: 20px 0 4px;
        border-top: 1px solid var(--line, #e1e1e1);
        margin-top: 20px;
      }
      .ed-section:first-child { border-top: none; margin-top: 0; padding-top: 16px; }

      .ed-section-title {
        font-size: 11px; font-weight: 700; letter-spacing: .07em;
        text-transform: uppercase; color: var(--muted, #888);
        margin-bottom: 14px;
      }

      .ed-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .ed-grid-3 { grid-template-columns: repeat(3, 1fr); }

      @media (max-width: 600px) {
        .ed-grid, .ed-grid-3 { grid-template-columns: 1fr; }
      }

      .ed-field { display: flex; flex-direction: column; gap: 5px; }
      .ed-label { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--muted, #888); }
      .ed-hint { font-size: 11px; color: var(--muted, #aaa); }

      /* check group (key levels) */
      .ed-check-group { display: flex; flex-direction: column; gap: 8px; margin-top: 2px; }
      .ed-check {
        display: flex; align-items: center; gap: 8px;
        font-size: 13px; font-weight: 500; cursor: pointer; user-select: none;
      }
      .ed-check input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #111; }

      /* toggles */
      .ed-toggles { display: flex; flex-direction: column; gap: 10px; }
      .ed-toggle {
        display: flex; align-items: center; gap: 10px;
        cursor: pointer; user-select: none;
      }
      .ed-toggle input[type="checkbox"] { position: absolute; opacity: 0; pointer-events: none; }
      .ed-toggle-track {
        position: relative; width: 36px; height: 20px; flex-shrink: 0;
        background: rgba(0,0,0,0.12); border-radius: 10px;
        transition: background .18s;
      }
      .ed-toggle input:checked ~ .ed-toggle-track { background: #111; }
      .ed-toggle-thumb {
        position: absolute; top: 2px; left: 2px;
        width: 16px; height: 16px; border-radius: 50%;
        background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.2);
        transition: transform .18s;
      }
      .ed-toggle input:checked ~ .ed-toggle-track .ed-toggle-thumb { transform: translateX(16px); }
      .ed-toggle-label { font-size: 13px; font-weight: 500; }

      /* actions row */
      .ed-actions {
        display: flex; align-items: center; justify-content: flex-end;
        gap: 10px; padding-top: 24px; border-top: 1px solid var(--line, #e1e1e1);
        margin-top: 24px; flex-wrap: wrap;
      }
      .ed-update-btn { border-color: rgba(0,0,0,0.18); }
    </style>
  </head>

  <body class="page-rules">
    <div class="bg-wash"></div>

    <header class="topbar">
      <div class="topbar-left">
        <div class="brand">
          <img src="/logo.PNG" class="brand-logo" alt="Logo" />
          <div class="brand-text">Trading Agent</div>
        </div>

        <nav class="tabs">
          <a class="tab" href="/">Workspace</a>
          <a class="tab" href="/outcomes">Outcomes</a>
          <a class="tab" href="/analytics">Analytics</a>
          <a class="tab" href="/watch">Watch</a>
          <a class="tab active" href="/rules">Strategy</a>
          <a class="tab" href="/backtest">Backtest</a>
          <a class="tab" href="/brokers">Brokers</a>
        </nav>
      </div>

      <div class="topbar-right">
        <div class="status">
          <div class="status-dot" id="socketDot"></div>
          <div class="status-text">Realtime</div>
        </div>
      </div>
    </header>

    <main class="shell">
      <div class="strategy-page" id="strategyPage">
        <div class="loading-spinner">Loading strategy…</div>
      </div>
    </main>

    <script src="/rules.js"></script>
  </body>
</html>
