<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Outcomes • Trading Agent</title>

    <link rel="stylesheet" href="/styles-v4.css" />
    <script src="/ui.js" defer></script>

    <style>
      #modal {
        padding: 24px;
      }

      #modal .modal-card {
        width: min(1160px, calc(100vw - 48px));
        margin: 0;
      }

      #modal .modal-inner {
        max-height: calc(100vh - 48px);
        overflow: auto;
      }

      #modalClose {
        cursor: pointer;
      }

      tr.clickable {
        cursor: pointer;
      }

      .outcome-detail {
        display: grid;
        gap: 18px;
      }

      .outcome-chart-panel {
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.04);
        padding: 14px;
      }

      .outcome-chart-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .outcome-chart-title {
        font-size: 15px;
        font-weight: 800;
      }

      .outcome-chart-caption {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .outcome-chart-legend {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .outcome-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-size: 10px;
        font-weight: 700;
      }

      .outcome-chart-stage {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        overflow: hidden;
        background: rgba(7, 11, 18, 0.9);
      }

      #outcomeChart {
        display: block;
        width: 100%;
        height: 440px;
      }

      .outcome-metrics {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 10px;
      }

      .outcome-metric,
      .outcome-detail-item,
      .outcome-raw {
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
      }

      .outcome-metric {
        padding: 12px 14px;
      }

      .outcome-metric-label,
      .outcome-detail-label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .outcome-metric-value,
      .outcome-detail-value {
        margin-top: 8px;
        font-size: 14px;
        font-weight: 800;
      }

      .outcome-detail-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .outcome-detail-item {
        padding: 12px 14px;
      }

      .outcome-raw {
        padding: 12px 14px;
      }

      .outcome-raw-body {
        margin-top: 8px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 980px) {
        .outcome-metrics {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .outcome-detail-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        #modal {
          padding: 14px;
        }

        #modal .modal-card {
          width: min(1160px, calc(100vw - 28px));
        }

        #outcomeChart {
          height: 340px;
        }

        .outcome-chart-head {
          flex-direction: column;
        }

        .outcome-chart-legend {
          justify-content: flex-start;
        }

        .outcome-metrics {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="bg-wash"></div>

    <header class="topbar">
      <div class="topbar-left">
        <div class="brand">
          <img src="/logo.PNG" class="brand-logo" alt="Logo" />
          <div class="brand-text">Trading Agent</div>
        </div>

        <nav class="tabs">
          <a class="tab" href="/">Workspace</a>
          <a class="tab active" href="/outcomes">Outcomes</a>
          <a class="tab" href="/watch">Watch</a>
          <a class="tab" href="/rules">Rules</a>
          <a class="tab" href="/backtest">Backtest</a>
          <a class="tab" href="/brokers">Brokers</a>
        </nav>
      </div>

      <div class="topbar-right">
        <div class="status">
          <div class="status-dot" id="socketDot"></div>
          <div class="status-text">Realtime</div>
        </div>
      </div>
    </header>

    <main class="shell">
      <section class="stack">
        <div class="card">
          <div class="card-head">
            <div>
              <div class="card-title">Outcomes</div>
              <div class="card-hint">Performance tracking for A+ entries (stocks only for now).</div>
            </div>
          </div>

          <div class="table-wrap">
            <!-- Filters -->
            <div class="table-controls" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
              <select id="dbStrategy" class="input small"></select>
            
              <input id="dbSym" class="input small" placeholder="Symbol" />
            
              <select id="dbStatus" class="input small">
                <option value="">All statuses</option>
                <option value="LIVE">LIVE</option>
                <option value="STOPPED">STOPPED</option>
                <option value="COMPLETED">COMPLETED</option>
              </select>
            
              <!-- NEW: time range -->
              <select id="dbRange" class="input small">
                <option value="all">All time</option>
                <option value="day">Today</option>
                <option value="week">Past week</option>
                <option value="month">Past month</option>
                <option value="year">Past year</option>
              </select>
            
              <label class="small" style="display:flex;align-items:center;">
                <input id="dbStoppedOnly" type="checkbox" />
                <span style="margin-left:4px;">Stopped only</span>
              </label>
            
              <button id="refreshBtn" class="btn small">Refresh</button>
            </div>

            <div id="dbEmpty" class="small" style="padding:8px; display:none;">No rows.</div>

            <table>
              <thead>
                <tr>
                  <th>Strategy</th>
                  <th>Symbol</th>
                  <th>Time</th>
                  <th>Market</th>
                  <th>RS</th>
                  <th>Level</th>
                  <th>Status</th>
                  <th>Stopped</th>
                  <th>PnL %</th>
                </tr>
              </thead>
              <tbody id="dbBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <!-- Modal (required for click → details + chart) -->
    <div id="modal">
      <div class="card rs-modal-card modal-card modal-inner">
        <div class="card-head" style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
          <div style="min-width:0;">
            <div class="card-title">Outcome Detail</div>
            <div id="modalSub" class="small muted" style="margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
          </div>
          <button id="modalClose" class="btn">Close</button>
        </div>
        <div id="modalBody" style="padding:14px 16px 16px 16px;"></div>
      </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/outcomes.js?v=22"></script>
  </body>
</html>
